name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install ".[test]"
      - run: pytest -v
        env:
          QT_QPA_PLATFORM: offscreen
